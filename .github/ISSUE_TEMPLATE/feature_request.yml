name: Feature request
description: Suggest an idea or improvement for the dashboard.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem-statement
    attributes:
      label: Problem statement
      description: What problem are you trying to solve? Is this related to a limitation you've hit?
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: Describe the solution you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've considered.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Anything else that would help, such as mockups, related issues, or links.
    validations:
      required: false
