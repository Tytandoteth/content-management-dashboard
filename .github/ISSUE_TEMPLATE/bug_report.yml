name: Bug report
description: Report a problem with the dashboard, renderer, or automation pipeline.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: repro-steps
    attributes:
      label: Steps to reproduce
      description: List the steps that trigger the bug.
      placeholder: |
        1. Run `pnpm dev`
        2. Navigate to ...
        3. Click on ...
        4. See error
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. macOS 14.5, Ubuntu 22.04, Windows 11
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node version
      description: Output of `node -v`
      placeholder: e.g. v20.11.1
    validations:
      required: true

  - type: input
    id: pnpm-version
    attributes:
      label: pnpm version
      description: Output of `pnpm -v`
      placeholder: e.g. 10.32.1
    validations:
      required: true

  - type: dropdown
    id: docker
    attributes:
      label: Running via Docker?
      options:
        - "Yes"
        - "No"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant terminal output, stack traces, or browser console errors. This is rendered as a code block, no need for backticks.
      render: shell
    validations:
      required: false
